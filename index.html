<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>מערכת ניהול ישיבה</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e0a;--bg2:#1a1812;--bg3:#242018;--gold:#c9a84c;--gold2:#e8c96a;--gold3:#f5e0a0;--text:#f0e8d0;--text2:#b8a880;--text3:#7a6e58;--red:#c0392b;--border:#3a3428;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:Heebo,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
.logo{font-family:"Frank Ruhl Libre",serif;font-size:1.4rem;color:var(--gold);display:flex;align-items:center;gap:10px}
nav{display:flex;gap:4px}
.nb{background:none;border:none;color:var(--text2);padding:8px 14px;border-radius:8px;cursor:pointer;font-family:Heebo;font-size:.9rem;display:flex;align-items:center;gap:6px;transition:all .2s}
.nb:hover,.nb.on{background:var(--bg3);color:var(--gold)}
main{padding:32px 24px;max-width:1200px;margin:0 auto}
.pg{display:none}.pg.on{display:block}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.ph h2{font-family:"Frank Ruhl Libre",serif;font-size:1.8rem;color:var(--gold3)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;text-align:center}
.card .n{font-family:"Frank Ruhl Libre",serif;font-size:2.5rem;color:var(--gold);line-height:1}
.card .l{color:var(--text2);font-size:.9rem;margin-top:6px}
.tw{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);color:var(--gold2);font-weight:600;padding:14px 16px;text-align:right;font-size:.9rem;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.95rem;vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:rgba(201,168,76,.04)}
.bg{background:none;border:1px solid var(--border);color:var(--text2);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.9rem;font-family:Heebo;transition:all .2s}
.bg:hover{border-color:var(--gold);color:var(--gold)}
.gg{background:var(--gold);color:var(--bg);border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.95rem;font-weight:700;font-family:Heebo;display:flex;align-items:center;gap:8px}
.gg:hover{opacity:.85}
.bd{color:var(--red);border:none;background:none;cursor:pointer;font-size:.85rem;font-family:Heebo}
.bd:hover{text-decoration:underline}
.bpres{background:rgba(39,174,96,.18);color:#4cd97a;display:inline-block;padding:3px 10px;border-radius:20px;font-size:.8rem;font-weight:600}
.babs{background:rgba(192,57,43,.18);color:#e74c3c;display:inline-block;padding:3px 10px;border-radius:20px;font-size:.8rem;font-weight:600}
.blate{background:rgba(201,168,76,.18);color:var(--gold2);display:inline-block;padding:3px 10px;border-radius:20px;font-size:.8rem;font-weight:600}
.mb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.mb.on{display:flex}
.md{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:36px;width:100%;max-width:480px;position:relative}
.md h3{font-family:"Frank Ruhl Libre",serif;font-size:1.5rem;color:var(--gold3);margin-bottom:24px}
.md label{display:block;color:var(--text2);font-size:.9rem;margin-bottom:6px}
.md input{width:100%;padding:11px 14px;margin-bottom:16px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:Heebo;font-size:.95rem}
.md input:focus{outline:none;border-color:var(--gold)}
.ma{display:flex;gap:12px;margin-top:8px;justify-content:flex-end}
.mc{position:absolute;top:16px;left:16px;background:none;border:none;color:var(--text3);font-size:1.4rem;cursor:pointer}
.mc:hover{color:var(--text)}
.ar{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.ar:last-child{border-bottom:none}
.abox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:20px}
.abox h3{font-family:"Frank Ruhl Libre",serif;color:var(--gold2);margin-bottom:16px;font-size:1.2rem}
.abtns{display:flex;gap:8px}
.ab{padding:6px 12px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:.85rem;font-family:Heebo;background:none;color:var(--text3);transition:all .15s}
.ab.sp{background:rgba(39,174,96,.2);border-color:#27ae60;color:#4cd97a}
.ab.sa{background:rgba(192,57,43,.2);border-color:#c0392b;color:#e74c3c}
.ab.sl{background:rgba(201,168,76,.2);border-color:var(--gold);color:var(--gold2)}
.sb{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 16px;width:100%;max-width:320px;color:var(--text);font-family:Heebo;font-size:.95rem;margin-bottom:20px}
.sb:focus{outline:none;border-color:var(--gold)}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty .ic{font-size:3rem;margin-bottom:12px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--gold);color:var(--gold2);padding:12px 24px;border-radius:30px;font-size:.95rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.on{opacity:1}
.ld{text-align:center;padding:40px;color:var(--text3)}
@media(max-width:640px){header{padding:0 12px}.nl{display:none}main{padding:16px 12px}.md{margin:16px;padding:24px}}
</style>
</head>
<body>
<header>
  <div class="logo">📚 מערכת ניהול ישיבה</div>
  <nav>
    <button class="nb on" onclick="pg('dash')" id="nb-dash">🏠 <span class="nl">בית</span></button>
    <button class="nb" onclick="pg('students')" id="nb-students">👥 <span class="nl">תלמידים</span></button>
    <button class="nb" onclick="pg('attend')" id="nb-attend">✅ <span class="nl">נוכחות</span></button>
    <button class="nb" onclick="pg('reports')" id="nb-reports">📊 <span class="nl">דוחות</span></button>
  </nav>
</header>
<main>
  <div class="pg on" id="pg-dash">
    <div class="ph"><h2>סקירה כללית</h2><span id="td" style="color:var(--text2)"></span></div>
    <div class="grid">
      <div class="card"><div class="n" id="s-tot">—</div><div class="l">סך תלמידים</div></div>
      <div class="card"><div class="n" id="s-pre">—</div><div class="l">נוכחים היום</div></div>
      <div class="card"><div class="n" id="s-abs">—</div><div class="l">נעדרים היום</div></div>
      <div class="card"><div class="n" id="s-rate">—</div><div class="l">אחוז נוכחות</div></div>
    </div>
    <div class="ph" style="margin-top:8px">
      <h2 style="font-size:1.3rem">נוכחות מהירה — היום</h2>
      <button class="gg" onclick="saveQ()">💾 שמור</button>
    </div>
    <div id="qa"><div class="ld">טוען...</div></div>
  </div>
  <div class="pg" id="pg-students">
    <div class="ph"><h2>ניהול תלמידים</h2><button class="gg" onclick="openAdd()">➕ הוסף תלמיד</button></div>
    <input class="sb" type="text" placeholder="🔍 חיפוש..." oninput="filt(this.value)">
    <div class="tw"><table><thead><tr><th>שם</th><th>שיעור</th><th>טלפון הורה</th><th>תאריך</th><th>פעולות</th></tr></thead>
    <tbody id="stb"><tr><td colspan="5"><div class="ld">טוען...</div></td></tr></tbody></table></div>
  </div>
  <div class="pg" id="pg-attend">
    <div class="ph"><h2>רישום נוכחות</h2>
      <div style="display:flex;gap:12px;align-items:center">
        <input type="date" id="dp" class="sb" style="margin:0;width:auto" onchange="loadA(this.value)">
        <button class="gg" onclick="saveA()">💾 שמור</button>
      </div>
    </div>
    <div id="al"></div>
  </div>
  <div class="pg" id="pg-reports">
    <div class="ph"><h2>דוחות נוכחות</h2>
      <div style="display:flex;gap:12px">
        <input type="month" id="rm" class="sb" style="margin:0;width:auto">
        <button class="gg" onclick="loadR()">📊 הצג</button>
      </div>
    </div>
    <div id="rc"></div>
  </div>
</main>
<div class="mb" id="ms"><div class="md">
  <button class="mc" onclick="cm('ms')">✕</button>
  <h3 id="mt"></h3>
  <input type="hidden" id="sid">
  <label>שם מלא *</label><input type="text" id="sn" placeholder="ישראל ישראלי">
  <label>שיעור</label><input type="text" id="sc" placeholder="שיעור א">
  <label>טלפון הורה</label><input type="tel" id="sp" placeholder="050-0000000">
  <label>הערות</label><input type="text" id="snotes" placeholder="הערות">
  <div class="ma">
    <button class="bg" onclick="cm('ms')">ביטול</button>
    <button class="gg" onclick="saveS()">💾 שמור</button>
  </div>
</div></div>
<div id="toast"></div>
<script>

var SB=supabase.createClient("https://hdcsqajavhxsbscgnpob.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkY3NxYWphdmh4c2JzY2ducG9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTQwMjIsImV4cCI6MjA4OTIzMDAyMn0.hf_jjLyAZk3IS6IPF_skyEEsrG50AXvJqI790qdJdlo");
var students=[],todayAtt={},curAtt={};
var TODAY=new Date().toISOString().split("T")[0];

function fmtD(d){
  return new Date(d+"T12:00:00").toLocaleDateString("he-IL",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
}

// init
document.getElementById("td").textContent=fmtD(TODAY);
document.getElementById("dp").value=TODAY;
document.getElementById("rm").value=TODAY.substring(0,7);

function pg(n){
  document.querySelectorAll(".pg").forEach(function(p){p.classList.remove("on")});
  document.querySelectorAll(".nb").forEach(function(b){b.classList.remove("on")});
  document.getElementById("pg-"+n).classList.add("on");
  document.getElementById("nb-"+n).classList.add("on");
  if(n==="students")loadSt();
  else if(n==="attend")loadA(document.getElementById("dp").value);
  else if(n==="dash")loadDash();
}

function loadDash(){
  SB.from("students").select("*").eq("active",true).then(function(r){
    students=r.data||[];
    document.getElementById("s-tot").textContent=students.length;
    SB.from("attendance").select("*").eq("date",TODAY).then(function(r2){
      var a=r2.data||[];
      var p=a.filter(function(x){return x.status==="present"}).length;
      var ab=a.filter(function(x){return x.status==="absent"}).length;
      document.getElementById("s-pre").textContent=p;
      document.getElementById("s-abs").textContent=ab;
      document.getElementById("s-rate").textContent=(students.length?Math.round(p/students.length*100):0)+"%";
      todayAtt={};
      a.forEach(function(x){todayAtt[x.student_id]=x.status});
      renderQ();
    });
  });
}

function renderQ(){
  var el=document.getElementById("qa");
  if(!students.length){
    el.innerHTML="<div class=\"empty\"><div class=\"ic\">👥</div><p>אין תלמידים — לחץ <b>תלמידים</b> להוסיף</p></div>";
    return;
  }
  var html="<div class=\"abox\"><h3>"+fmtD(TODAY)+"</h3>";
  students.forEach(function(s){
    var p=todayAtt[s.id]==="present"?" sp":"";
    var l=todayAtt[s.id]==="late"?" sl":"";
    var ab=todayAtt[s.id]==="absent"?" sa":"";
    html+="<div class=\"ar\">";
    html+="<span>"+s.name+(s.class_name?" <small style=\"color:var(--text3)\">· "+s.class_name+"</small>":"")+"</span>";
    html+="<div class=\"abtns\">";
    html+="<button class=\"ab"+p+"\" data-id=\""+s.id+"\" data-st=\"present\" data-map=\"q\">✓ נוכח</button>";
    html+="<button class=\"ab"+l+"\" data-id=\""+s.id+"\" data-st=\"late\" data-map=\"q\">⏰ איחור</button>";
    html+="<button class=\"ab"+ab+"\" data-id=\""+s.id+"\" data-st=\"absent\" data-map=\"q\">✗ נעדר</button>";
    html+="</div></div>";
  });
  html+="</div>";
  el.innerHTML=html;
  bindAtt();
}

function renderAtt(date){
  var el=document.getElementById("al");
  if(!students.length){el.innerHTML="<div class=\"empty\"><div class=\"ic\">👥</div><p>אין תלמידים</p></div>";return}
  var html="<div class=\"abox\"><h3>"+fmtD(date)+"</h3>";
  students.forEach(function(s){
    var p=curAtt[s.id]==="present"?" sp":"";
    var l=curAtt[s.id]==="late"?" sl":"";
    var ab=curAtt[s.id]==="absent"?" sa":"";
    html+="<div class=\"ar\">";
    html+="<span>"+s.name+(s.class_name?" <small style=\"color:var(--text3)\">· "+s.class_name+"</small>":"")+"</span>";
    html+="<div class=\"abtns\">";
    html+="<button class=\"ab"+p+"\" data-id=\""+s.id+"\" data-st=\"present\" data-map=\"c\">✓ נוכח</button>";
    html+="<button class=\"ab"+l+"\" data-id=\""+s.id+"\" data-st=\"late\" data-map=\"c\">⏰ איחור</button>";
    html+="<button class=\"ab"+ab+"\" data-id=\""+s.id+"\" data-st=\"absent\" data-map=\"c\">✗ נעדר</button>";
    html+="</div></div>";
  });
  html+="</div>";
  el.innerHTML=html;
  bindAtt();
}

function bindAtt(){
  document.querySelectorAll(".ab[data-id]").forEach(function(btn){
    btn.addEventListener("click",function(){
      var id=this.getAttribute("data-id");
      var st=this.getAttribute("data-st");
      var map=this.getAttribute("data-map");
      if(map==="q") todayAtt[id]=st;
      else curAtt[id]=st;
      var btns=this.closest(".abtns").querySelectorAll(".ab");
      btns.forEach(function(b){
        b.classList.remove("sp","sl","sa");
      });
      if(st==="present") this.classList.add("sp");
      else if(st==="late") this.classList.add("sl");
      else this.classList.add("sa");
    });
  });
}

function saveQ(){
  saveAD(TODAY,todayAtt).then(function(){loadDash()});
}

function loadSt(){
  document.getElementById("stb").innerHTML="<tr><td colspan=\"5\"><div class=\"ld\">טוען...</div></td></tr>";
  SB.from("students").select("*").eq("active",true).order("name").then(function(r){
    students=r.data||[];
    renderSt(students);
  });
}

function renderSt(list){
  var tb=document.getElementById("stb");
  if(!list.length){
    tb.innerHTML="<tr><td colspan=\"5\"><div class=\"empty\"><div class=\"ic\">👥</div><p>אין תלמידים</p></div></td></tr>";
    return;
  }
  var html="";
  list.forEach(function(s){
    html+="<tr>";
    html+="<td><strong>"+s.name+"</strong></td>";
    html+="<td>"+(s.class_name||"—")+"</td>";
    html+="<td style=\"direction:ltr\">"+(s.parent_phone||"—")+"</td>";
    html+="<td>"+(s.created_at?new Date(s.created_at).toLocaleDateString("he-IL"):"—")+"</td>";
    html+="<td style=\"display:flex;gap:8px\">";
    html+="<button class=\"bg\" style=\"padding:6px 10px\" data-edit=\""+s.id+"\">✏️</button>";
    html+="<button class=\"bd\" data-del=\""+s.id+"\" data-name=\""+s.name+"\">מחק</button>";
    html+="</td></tr>";
  });
  tb.innerHTML=html;
  tb.querySelectorAll("[data-edit]").forEach(function(btn){
    btn.addEventListener("click",function(){editS(this.getAttribute("data-edit"))});
  });
  tb.querySelectorAll("[data-del]").forEach(function(btn){
    btn.addEventListener("click",function(){delS(this.getAttribute("data-del"),this.getAttribute("data-name"))});
  });
}

function filt(q){
  renderSt(students.filter(function(s){return s.name.includes(q)||(s.class_name||"").includes(q)}));
}

function openAdd(){
  document.getElementById("mt").textContent="הוסף תלמיד";
  ["sid","sn","sc","sp","snotes"].forEach(function(id){document.getElementById(id).value=""});
  document.getElementById("ms").classList.add("on");
}

function editS(id){
  var s=students.find(function(x){return x.id==id});
  if(!s)return;
  document.getElementById("mt").textContent="עריכת תלמיד";
  document.getElementById("sid").value=s.id;
  document.getElementById("sn").value=s.name;
  document.getElementById("sc").value=s.class_name||"";
  document.getElementById("sp").value=s.parent_phone||"";
  document.getElementById("snotes").value=s.notes||"";
  document.getElementById("ms").classList.add("on");
}

function saveS(){
  var name=document.getElementById("sn").value.trim();
  if(!name){toast("נא להכניס שם");return}
  var id=document.getElementById("sid").value;
  var d={name:name,class_name:document.getElementById("sc").value.trim(),parent_phone:document.getElementById("sp").value.trim(),notes:document.getElementById("snotes").value.trim(),active:true};
  var p=id?SB.from("students").update(d).eq("id",id):SB.from("students").insert(d);
  p.then(function(){toast(id?"✅ עודכן":"✅ נוסף");cm("ms");loadSt()});
}

function delS(id,name){
  if(!confirm("למחוק את "+name+"?"))return;
  SB.from("students").update({active:false}).eq("id",id).then(function(){toast("🗑️ הוסר");loadSt()});
}

function loadA(date){
  var el=document.getElementById("al");
  el.innerHTML="<div class=\"ld\">טוען...</div>";
  var p1=students.length?Promise.resolve({data:students}):SB.from("students").select("*").eq("active",true).order("name");
  p1.then(function(r){
    if(!students.length)students=r.data||[];
    SB.from("attendance").select("*").eq("date",date).then(function(r2){
      curAtt={};
      (r2.data||[]).forEach(function(x){curAtt[x.student_id]=x.status});
      renderAtt(date);
    });
  });
}

function saveA(){
  saveAD(document.getElementById("dp").value,curAtt);
}

function saveAD(date,map){
  var u=Object.entries(map).map(function(e){return{student_id:parseInt(e[0]),date:date,status:e[1]}});
  if(!u.length){toast("לא נבחרה נוכחות");return Promise.resolve()}
  return SB.from("attendance").upsert(u,{onConflict:"student_id,date"}).then(function(r){
    if(r.error)toast("שגיאה: "+r.error.message);
    else toast("✅ נוכחות נשמרה!");
  });
}

function loadR(){
  var month=document.getElementById("rm").value;
  if(!month)return;
  var parts=month.split("-");var y=parts[0];var m=parts[1];
  var el=document.getElementById("rc");
  el.innerHTML="<div class=\"ld\">מחשב...</div>";
  SB.from("attendance").select("*").gte("date",y+"-"+m+"-01").lte("date",y+"-"+m+"-31").then(function(ra){
    SB.from("students").select("*").eq("active",true).order("name").then(function(rs){
      var s=rs.data||[];var a=ra.data||[];
      if(!s.length){el.innerHTML="<div class=\"empty\"><div class=\"ic\">📊</div><p>אין נתונים</p></div>";return}
      var rows=s.map(function(x){
        var mine=a.filter(function(r){return r.student_id==x.id});
        var p=mine.filter(function(r){return r.status==="present"}).length;
        var l=mine.filter(function(r){return r.status==="late"}).length;
        var ab=mine.filter(function(r){return r.status==="absent"}).length;
        var tot=p+l+ab;
        var rate=tot?Math.round((p+l)/tot*100):0;
        return Object.assign({},x,{p:p,l:l,ab:ab,tot:tot,rate:rate});
      });
      var html="<div class=\"tw\"><table><thead><tr><th>תלמיד</th><th>שיעור</th><th>נוכח</th><th>איחור</th><th>נעדר</th><th>ימים</th><th>%</th></tr></thead><tbody>";
      rows.forEach(function(r){
        var cls=r.rate>=80?"bpres":r.rate>=60?"blate":"babs";
        html+="<tr><td><strong>"+r.name+"</strong></td><td>"+(r.class_name||"—")+"</td>";
        html+="<td style=\"color:#4cd97a\">"+r.p+"</td><td style=\"color:var(--gold2)\">"+r.l+"</td>";
        html+="<td style=\"color:#e74c3c\">"+r.ab+"</td><td>"+r.tot+"</td>";
        html+="<td><span class=\""+cls+"\">"+r.rate+"%</span></td></tr>";
      });
      html+="</tbody></table></div>";
      el.innerHTML=html;
    });
  });
}

function cm(id){document.getElementById(id).classList.remove("on")}

var tt;
function toast(m){
  var t=document.getElementById("toast");
  t.textContent=m;t.classList.add("on");
  clearTimeout(tt);
  tt=setTimeout(function(){t.classList.remove("on")},2500);
}

// Start
loadDash();

</script>
